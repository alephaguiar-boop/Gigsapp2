<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aleph Gigs Master v2.3</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --danger: #ef4444; --gold: #f59e0b; --success: #22c55e; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 140px; }
        header { padding: 55px 20px 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155; display: flex; padding-bottom: calc(15px + env(safe-area-inset-bottom)); z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 18px; font-size: 11px; font-weight: 900; color: #94a3b8; text-transform: uppercase; }
        .nav-item.active-nav { color: var(--accent); border-top: 3px solid var(--accent); }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.2s; }
        .active { display: block; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; margin-bottom: 15px; border: 1px solid #334155; position: relative; overflow: hidden; }
        .status-bar { position: absolute; left: 0; top: 0; bottom: 0; width: 6px; }
        .bg-red { background: var(--danger); } .bg-gold { background: var(--gold); } .bg-green { background: var(--success); }
        .btn { background: var(--accent); color: white; padding: 16px; border-radius: 12px; font-weight: 800; border: none; width: 100%; margin-top: 10px; display: block; text-align: center; text-decoration: none; font-size: 14px; }
        .btn-refresh { background: var(--success); font-size: 10px; padding: 8px 12px; border-radius: 6px; }
        input, textarea { background: #0f172a; border: 1px solid #475569; border-radius: 10px; padding: 14px; width: 100%; color: white; margin-top: 10px; font-size: 16px; }
        #story-view { display: none; position: fixed; inset: 0; background: #000; z-index: 2000; padding: 100px 40px; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div id="story-view" onclick="this.style.display='none'">
        <div style="color:var(--accent); letter-spacing:10px; font-weight:900; font-size:12px">LIVE MUSIC</div>
        <div id="st-title" style="font-size:42px; font-weight:900; color:#fff; margin:25px 0; line-height:1.1; text-transform:uppercase"></div>
        <div id="st-venue" style="font-size:22px; color:var(--accent); letter-spacing:3px; font-weight:300"></div>
        <div id="st-date" style="font-size:18px; margin-top:15px; color:white; font-weight:700"></div>
        <div id="st-badge" style="margin-top:50px"></div>
    </div>

    <header>
        <h1 style="letter-spacing:-1px">ALEPH GIGS</h1>
        <button onclick="syncCalendar()" style="background:var(--accent); border:none; color:white; padding:10px 18px; border-radius:30px; font-size:12px; font-weight:900">SYNC</button>
    </header>

    <main>
        <section id="view-home" class="tab-content active"><div id="gig-list"></div></section>
        <section id="view-invites" class="tab-content">
            <h3>Invite Manager</h3>
            <textarea id="contact-list" rows="15" placeholder="Name, City (e.g. Miles, Brighton)" onchange="saveData()"></textarea>
        </section>
        <section id="view-setup" class="tab-content">
            <div class="card">
                <h3>Setup</h3>
                <input type="text" id="set-ical" placeholder="Paste iCal URL here" onchange="saveData()">
                <textarea id="set-lineup" rows="3" placeholder="Default Lineup" onchange="saveData()"></textarea>
            </div>
            <button class="btn" style="background:var(--danger)" onclick="if(confirm('Wipe everything?')) {localStorage.clear(); location.reload();}">RESET APP</button>
        </section>
        <section id="view-detail" class="tab-content"><div id="detail-content"></div></section>
    </main>

    <nav>
        <div onclick="showView('home')" class="nav-item active-nav" id="nav-home">Gigs</div>
        <div onclick="showView('invites')" class="nav-item" id="nav-invites">Invites</div>
        <div onclick="showView('setup')" class="nav-item" id="nav-setup">Setup</div>
    </nav>

    <script>
        const VENUE_DB = [
            { match: "Verdict", cap: 60, url: "https://www.verdictjazz.com/tickets" },
            { match: "Ronnie", cap: 220, url: "https://www.ronniescotts.co.uk/show-calendar" },
            { match: "606", cap: 120, url: "https://www.606club.co.uk/events/" },
            { match: "PizzaExpress", cap: 110, url: "https://www.pizzaexpresslive.com/whats-on" },
            { match: "Vortex", cap: 100, url: "https://www.vortexjazz.co.uk/events/" },
            { match: "Peggy", cap: 90, url: "https://peggysskylight.co.uk/events/" }
        ];

        let gigs = JSON.parse(localStorage.getItem('aleph_gigs')) || [];
        let setup = JSON.parse(localStorage.getItem('aleph_setup')) || { ical: '', lineup: '' };
        let contacts = localStorage.getItem('aleph_contacts') || "";

        function showView(v) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById('view-' + v).classList.add('active');
            if(document.getElementById('nav-' + v)) document.getElementById('nav-' + v).classList.add('active-nav');
            if(v === 'home') renderGigs();
        }

        function saveData() {
            setup.ical = document.getElementById('set-ical').value;
            setup.lineup = document.getElementById('set-lineup').value;
            contacts = document.getElementById('contact-list').value;
            localStorage.setItem('aleph_setup', JSON.stringify(setup));
            localStorage.setItem('aleph_contacts', contacts);
        }

        async function syncCalendar() {
            if(!setup.ical) return alert("Add iCal URL in Setup.");
            try {
                const proxy = "https://corsproxy.io/?" + encodeURIComponent(setup.ical);
                const res = await fetch(proxy);
                const text = await res.text();
                const events = text.split("BEGIN:VEVENT").slice(1);
                
                const today = new Date();
                today.setHours(0,0,0,0);

                const newGigs = events.map(ev => {
                    const title = ev.match(/SUMMARY:(.*)/)?.[1]?.trim() || "Gig";
                    const loc = ev.match(/LOCATION:(.*)/)?.[1]?.trim() || "TBC";
                    const dtStart = ev.match(/DTSTART[:;](?:VALUE=DATE:)?(\d{8})/)?.[1];
                    if(!dtStart) return null;
                    
                    const dateObj = new Date(dtStart.substring(0,4), dtStart.substring(4,6)-1, dtStart.substring(6,8));
                    
                    // RULE: ONLY FUTURE EVENTS
                    if(dateObj < today) return null;

                    const dateStr = dateObj.toISOString().split('T')[0];
                    const vData = VENUE_DB.find(v => loc.includes(v.match) || title.includes(v.match)) || { cap: 50 };
                    return { id: Math.random(), title, date: dateStr, venue: loc, sold: 0, cap: vData.cap, type: 'ticketed' };
                }).filter(g => g !== null);

                gigs = newGigs.sort((a,b) => new Date(a.date) - new Date(b.date));
                localStorage.setItem('aleph_gigs', JSON.stringify(gigs));
                renderGigs();
                alert("Sync Complete. All past events hidden.");
            } catch (e) { alert("Error: Sync failed."); }
        }

        function renderGigs() {
            const list = document.getElementById('gig-list');
            list.innerHTML = '';
            const today = new Date().setHours(0,0,0,0);

            gigs.forEach(g => {
                const gigDate = new Date(g.date).setHours(0,0,0,0);
                const days = Math.ceil((gigDate - today) / (1000 * 60 * 60 * 24));
                const ratio = g.sold / g.cap;
                const color = ratio > 0.8 ? 'bg-red' : (ratio > 0.4 ? 'bg-gold' : 'bg-green');
                
                list.innerHTML += `
                    <div class="card" onclick="viewDetail(${g.id})">
                        <div class="status-bar ${color}"></div>
                        <div style="display:flex; justify-content:space-between; margin-left:10px">
                            <b style="font-size:18px">${g.title}</b>
                            <span style="color:var(--accent); font-weight:900">${days === 0 ? 'TODAY' : 'D-'+days}</span>
                        </div>
                        <div style="margin:8px 0 0 10px; font-size:12px; opacity:0.6">📍 ${g.venue}</div>
                    </div>`;
            });
        }

        function viewDetail(id) {
            const g = gigs.find(x => x.id === id);
            const vData = VENUE_DB.find(v => g.venue.includes(v.match)) || { url: "https://google.com", cap: 50 };
            
            document.getElementById('detail-content').innerHTML = `
                <div class="card">
                    <h2>${g.title}</h2>
                    <p style="color:var(--accent); margin:5px 0">${g.venue}</p>
                    <div style="display:flex; gap:10px; margin-top:15px">
                        <button class="btn btn-sec" onclick="openStory(${id})">📸 STORY</button>
                        <button class="btn btn-sec" onclick="window.open('https://maps.apple.com/?daddr='+encodeURIComponent(g.venue))">🚗 MAPS</button>
                    </div>
                </div>
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <h3 style="margin:0">Sales: ${g.sold} / ${g.cap}</h3>
                        <a href="${vData.url}" target="_blank" class="btn btn-refresh" style="text-decoration:none; color:white">CHECK SITE</a>
                    </div>
                    <input type="range" min="0" max="${g.cap}" value="${g.sold}" onchange="updateSold(${id}, this.value)" style="width:100%; margin-top:20px; accent-color:var(--accent)">
                    <button class="btn btn-sec" onclick="editVenue(${id})">✏️ EDIT VENUE/CAP</button>
                </div>
                <button class="btn" onclick="showView('home')">BACK</button>
            `;
            showView('detail');
        }

        function editVenue(id) {
            const g = gigs.find(x => x.id === id);
            const newV = prompt("Venue Name:", g.venue);
            const newC = prompt("Capacity:", g.cap);
            if(newV) g.venue = newV;
            if(newC) g.cap = parseInt(newC);
            localStorage.setItem('aleph_gigs', JSON.stringify(gigs));
            viewDetail(id);
        }

        function updateSold(id, val) { gigs.find(g => g.id === id).sold = parseInt(val); localStorage.setItem('aleph_gigs', JSON.stringify(gigs)); viewDetail(id); }
        function openStory(id) {
            const g = gigs.find(x => x.id === id);
            document.getElementById('st-title').innerText = g.title;
            document.getElementById('st-venue').innerText = g.venue.split(',')[0];
            document.getElementById('st-date').innerText = g.date;
            document.getElementById('st-badge').innerHTML = (g.sold/g.cap > 0.8) ? '<div style="background:var(--danger); color:white; padding:12px; font-weight:900; border-radius:8px">LOW TICKETS</div>' : '';
            document.getElementById('story-view').style.display = 'block';
        }
        showView('home');
    </script>
</body>
</html>
