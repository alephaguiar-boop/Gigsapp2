<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleph Marketing Control</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --gold: #fbbf24; --danger: #ef4444; --success: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 100px; }
        
        /* Layout Components */
        header { padding: 50px 20px 15px; background: var(--bg); border-bottom: 1px solid #1e293b; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; }
        .tab-content { display: none; padding: 15px; animation: fadeIn 0.2s; }
        .active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 12px; border: 1px solid #334155; }
        
        /* Stats & Badges */
        .score-pill { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; text-transform: uppercase; margin-right: 5px; }
        .score-good { background: rgba(34, 197, 94, 0.2); color: var(--success); }
        .score-weak { background: rgba(239, 68, 68, 0.2); color: var(--danger); }
        
        /* Dashboard Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        /* Typography */
        h1 { font-size: 18px; margin: 0; letter-spacing: 1px; color: var(--accent); }
        h2 { font-size: 22px; margin-bottom: 5px; }
        h3 { font-size: 14px; color: #94a3b8; text-transform: uppercase; margin-bottom: 10px; letter-spacing: 1px; }
        
        /* Interactive */
        .btn { background: var(--accent); color: white; padding: 14px; border-radius: 10px; border: none; font-weight: bold; width: 100%; margin-top: 10px; display: block; text-align: center; text-decoration: none; font-size: 14px; }
        .btn-outline { background: transparent; border: 1px solid #475569; color: #94a3b8; }
        input, textarea, select { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; width: 100%; color: white; box-sizing: border-box; margin-top: 5px; }
        
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #0f172a; border-top: 1px solid #1e293b; display: flex; padding-bottom: 30px; }
        .nav-item { flex: 1; text-align: center; padding: 15px; font-size: 10px; font-weight: 800; color: #64748b; }
        .nav-item.active-nav { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>ALEPH CONTROL ROOM</h1>
        <button onclick="syncCalendar()" style="background:none; border:none; color:var(--accent); font-weight:900">SYNC</button>
    </header>

    <main>
        <section id="view-home" class="tab-content active">
            <h3>Active Campaigns</h3>
            <div id="gig-list"></div>
        </section>

        <section id="view-detail" class="tab-content">
            <div id="dashboard-content"></div>
        </section>

        <section id="view-invites" class="tab-content">
            <h3>Invite Manager</h3>
            <div class="card">
                <p style="font-size:13px; opacity:0.7">Paste contacts as: Name, Group (e.g. John, Brighton)</p>
                <textarea id="contact-list" rows="10" placeholder="Dave, Musician&#10;Sarah, Superfan" onchange="saveContacts()"></textarea>
            </div>
        </section>
    </main>

    <nav>
        <div onclick="showView('home')" class="nav-item active-nav" id="nav-home">GIGS</div>
        <div onclick="showView('invites')" class="nav-item" id="nav-invites">INVITES</div>
        <div onclick="showView('settings')" class="nav-item">⚙️</div>
    </nav>

    <script>
        let gigs = JSON.parse(localStorage.getItem('aleph_gigs')) || [];
        let contacts = localStorage.getItem('aleph_contacts') || "";

        function showView(viewId) {
            document.querySelectorAll('.tab-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById('view-' + viewId).classList.add('active');
            if(document.getElementById('nav-' + viewId)) document.getElementById('nav-' + viewId).classList.add('active-nav');
            if(viewId === 'home') renderGigs();
            if(viewId === 'invites') document.getElementById('contact-list').value = contacts;
        }

        function saveContacts() {
            contacts = document.getElementById('contact-list').value;
            localStorage.setItem('aleph_contacts', contacts);
        }

        function getDaysUntil(dateStr) {
            return Math.ceil((new Date(dateStr) - new Date().setHours(0,0,0,0)) / (1000*60*60*24));
        }

        function renderGigs() {
            const list = document.getElementById('gig-list');
            list.innerHTML = '';
            gigs.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(g => {
                const days = getDaysUntil(g.date);
                if (days < -1) return;
                const score = (g.poster ? 1 : 0) + (g.video ? 1 : 0) + (g.link ? 1 : 0);
                list.innerHTML += `
                    <div class="card" onclick="viewDashboard(${g.id})">
                        <div style="display:flex; justify-content:space-between">
                            <b style="font-size:18px">${g.title}</b>
                            <span style="color:var(--accent); font-weight:900">${days === 0 ? 'TONIGHT' : 'D-'+days}</span>
                        </div>
                        <div style="margin-top:10px">
                            <span class="score-pill ${score===3?'score-good':'score-weak'}">Pack: ${score}/3</span>
                            <span class="score-pill ${g.sold/g.cap > 0.7 ? 'score-good' : ''}">${Math.round((g.sold/g.cap)*100)}% Sold</span>
                        </div>
                    </div>`;
            });
        }

        function viewDashboard(id) {
            const g = gigs.find(x => x.id === id);
            const days = getDaysUntil(g.date);
            
            document.getElementById('dashboard-content').innerHTML = `
                <div style="margin-bottom:20px">
                    <button onclick="showView('home')" style="background:none; border:none; color:var(--accent); padding:0">← Back</button>
                    <h2>${g.title}</h2>
                    <p style="color:#94a3b8; margin:0">${g.venue} • ${g.date}</p>
                </div>

                <div class="grid-2">
                    <div class="card">
                        <h3>Status</h3>
                        <div style="font-size:24px; font-weight:900">${g.sold}/${g.cap}</div>
                        <p style="font-size:11px; opacity:0.6">Ticket Goal</p>
                    </div>
                    <div class="card">
                        <h3>Content</h3>
                        <div style="font-size:11px">
                            ${g.poster ? '✅ Poster' : '❌ No Poster'}<br>
                            ${g.video ? '✅ Video' : '❌ No Video'}<br>
                            ${g.link ? '✅ Link' : '❌ No Link'}
                        </div>
                    </div>
                </div>

                <div class="card">
                    <h3>Action: ${days === 0 ? 'Push Tonight' : 'D-'+days + ' Post'}</h3>
                    <p style="font-size:13px; color:var(--gold)">${getStrategy(days)}</p>
                    <button class="btn" onclick="generateCaption(${id})">📝 Copy Caption</button>
                    <button class="btn btn-outline" onclick="openInvites(${id})">✉️ Generate Invites</button>
                </div>

                <div class="card">
                    <h3>Visual Kit</h3>
                    <button class="btn btn-outline" onclick="togglePoster(${id})">${g.poster ? 'View Poster' : '+ Add Poster URL'}</button>
                    <button class="btn btn-outline" style="margin-top:8px" onclick="toggleVideo(${id})">${g.video ? 'View Reel' : '+ Add Reel URL'}</button>
                </div>
                
                <button class="btn-outline" style="width:100%; border:none; color:#ef4444; margin-top:20px" onclick="deleteGig(${id})">Archive Gig</button>
            `;
            showView('detail');
        }

        function getStrategy(days) {
            if(days === 0) return "Final Call. Post Story with direct link sticker and 'Tonight' headline.";
            if(days <= 2) return "Urgency mode. Share ticket count remaining. Send direct messages to warm contacts.";
            if(days <= 7) return "Personnel focus. Share a video of the band rehearsing or a past clip.";
            return "Early awareness. Share the high-quality poster and announcement text.";
        }

        function generateCaption(id) {
            const g = gigs.find(x => x.id === id);
            const text = `NEXT UP: ${g.title}\n📍 ${g.venue}\n🗓️ ${g.date}\n\nReally excited for this one. Tickets are moving fast!\n\nGrab yours here: ${g.link || '[Link]'}`;
            navigator.clipboard.writeText(text);
            alert("Instagram Caption Copied!");
        }

        function openInvites(id) {
            const g = gigs.find(x => x.id === id);
            const location = g.venue.toLowerCase();
            const filtered = contacts.split('\n').filter(c => location.includes(c.split(',')[1]?.trim().toLowerCase() || "none"));
            
            if(filtered.length === 0) {
                alert("No contacts found for " + g.venue + ". Add some in the Invites tab!");
                return;
            }
            
            const inviteText = `Hi ${filtered[0].split(',')[0]}, I'm playing at ${g.venue} on ${g.date}. Would love to see you there! Link: ${g.link}`;
            navigator.clipboard.writeText(inviteText);
            alert("Invite generated for " + filtered[0].split(',')[0] + " (Copied to clipboard)");
        }

        function togglePoster(id) {
            const g = gigs.find(x => x.id === id);
            const url = prompt("Poster Image URL:", g.poster || "");
            if(url !== null) { g.poster = url; localStorage.setItem('aleph_gigs', JSON.stringify(gigs)); viewDashboard(id); }
        }

        function toggleVideo(id) {
            const g = gigs.find(x => x.id === id);
            const url = prompt("Video/Reel URL:", g.video || "");
            if(url !== null) { g.video = url; localStorage.setItem('aleph_gigs', JSON.stringify(gigs)); viewDashboard(id); }
        }

        function deleteGig(id) { if(confirm("Archive this gig?")) { gigs = gigs.filter(g => g.id !== id); localStorage.setItem('aleph_gigs', JSON.stringify(gigs)); showView('home'); } }

        async function syncCalendar() { /* iCal logic remains */ alert("Syncing..."); }

        renderGigs();
    </script>
</body>
</html>
