<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleph Gigs: Venue Intelligence</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --danger: #ef4444; --gold: #f59e0b; --success: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; }
        header { padding: 45px 20px 15px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.2s; }
        .active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #334155; }
        
        /* Sales Urgency Indicators */
        .urgency-high { border-left: 5px solid var(--danger); }
        .urgency-med { border-left: 5px solid var(--gold); }
        .urgency-low { border-left: 5px solid var(--success); }

        .type-btn { flex: 1; background: #334155; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 10px; font-weight: 700; opacity: 0.5; }
        .type-btn.active-type { background: var(--accent); opacity: 1; }
        .btn { background: var(--accent); color: white; padding: 16px; border-radius: 12px; font-weight: bold; border: none; width: 100%; margin-top: 10px; display: block; text-align: center; text-decoration: none; font-size: 14px; }
        .btn-refresh { background: var(--success); font-size: 12px; padding: 8px; margin-bottom: 10px; }
        input, textarea { background: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 12px; width: 100%; color: white; box-sizing: border-box; margin-top: 8px; }
        
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155; display: flex; padding-bottom: 30px; }
        .nav-item { flex: 1; text-align: center; padding: 15px; font-size: 10px; font-weight: 800; color: #94a3b8; }
        .nav-item.active-nav { color: var(--accent); border-top: 2px solid var(--accent); }
    </style>
</head>
<body>

    <header>
        <h1>ALEPH CONTROL</h1>
        <button onclick="syncCalendar()" style="background:var(--accent); border:none; color:white; padding:6px 14px; border-radius:20px; font-size:11px; font-weight:bold">SYNC</button>
    </header>

    <main>
        <section id="view-home" class="tab-content active"><div id="gig-list"></div></section>
        <section id="view-invites" class="tab-content">
            <h3>Invite Manager</h3>
            <textarea id="contact-list" rows="12" placeholder="Name, City" onchange="saveContacts()"></textarea>
        </section>
        <section id="view-detail" class="tab-content"><div id="detail-content"></div></section>
    </main>

    <nav>
        <div onclick="showView('home')" class="nav-item active-nav" id="nav-home">GIGS</div>
        <div onclick="showView('invites')" class="nav-item" id="nav-invites">INVITES</div>
    </nav>

    <script>
        let gigs = JSON.parse(localStorage.getItem('aleph_gigs')) || [];
        const VENUE_DB = [
            { name: "Ronnie Scott", cap: 220, link: "https://www.ronniescotts.co.uk" },
            { name: "606 Club", cap: 120, link: "https://www.606club.co.uk" },
            { name: "PizzaExpress Soho", cap: 110, link: "https://www.pizzaexpresslive.com" },
            { name: "Vortex", cap: 100, link: "https://www.vortexjazz.org" },
            { name: "The Verdict", cap: 60, link: "https://www.verdictjazz.com" },
            { name: "Peggy's Skylight", cap: 90, link: "https://peggysskylight.co.uk" }
        ];

        function showView(viewId) {
            document.querySelectorAll('.tab-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('nav-' + viewId).classList.add('active-nav');
            if(viewId === 'home') renderGigs();
        }

        function renderGigs() {
            const list = document.getElementById('gig-list');
            list.innerHTML = '';
            gigs.forEach(g => {
                const ratio = g.sold / g.cap;
                const urgencyClass = ratio > 0.8 ? 'urgency-high' : (ratio > 0.5 ? 'urgency-med' : 'urgency-low');
                list.innerHTML += `
                    <div class="card ${urgencyClass}" onclick="viewDetail(${g.id})">
                        <div style="display:flex; justify-content:space-between">
                            <b>${g.title}</b>
                            <span style="font-size:12px">${Math.round(ratio*100)}% FULL</span>
                        </div>
                        <div style="font-size:11px; opacity:0.6; margin-top:5px">📍 ${g.venue}</div>
                    </div>`;
            });
        }

        function viewDetail(id) {
            const g = gigs.find(x => x.id === id);
            const ratio = g.sold / g.cap;
            const strategy = getDynamicStrategy(g, ratio);

            document.getElementById('detail-content').innerHTML = `
                <div class="card">
                    <h2>${g.title}</h2>
                    <p>${g.venue} | Cap: ${g.cap}</p>
                    <button class="btn btn-refresh" onclick="refreshTickets(${id})">🔄 REFRESH SALES DATA</button>
                </div>

                <div class="card" style="border-top: 4px solid ${strategy.color}">
                    <h3>Current Strategy: ${strategy.mode}</h3>
                    <p style="font-size:13px">${strategy.tip}</p>
                    <button class="btn" onclick="copyDynamicCaption(${id}, '${strategy.mode}')">📝 COPY ${strategy.mode} CAPTION</button>
                </div>

                <div class="card">
                    <h3>Ticket Tracker</h3>
                    <input type="range" min="0" max="${g.cap}" value="${g.sold}" onchange="updateSold(${id}, this.value)" style="width:100%">
                    <p>${g.sold} / ${g.cap} Sold</p>
                </div>
            `;
            showView('detail');
        }

        function getDynamicStrategy(g, ratio) {
            const days = Math.ceil((new Date(g.date) - new Date().setHours(0,0,0,0)) / (1000*60*60*24));
            
            if (ratio > 0.9) return { mode: "SOLD OUT PUSH", color: "#ef4444", tip: "Focus on 'Standing Room Only' or 'Returns Only'. Tag friends who missed out." };
            if (ratio > 0.75) return { mode: "LOW TICKET ALERT", color: "#f59e0b", tip: "Strong urgency. Use 'Less than 10 seats left'. Direct message your top fans." };
            if (days < 3 && ratio < 0.4) return { mode: "EMERGENCY BOOST", color: "#3b82f6", tip: "Offer a 'Musician Friend' discount or post a high-energy rehearsal video NOW." };
            return { mode: "GENERAL PROMO", color: "#22c55e", tip: "Standard awareness. Share the lineup and venue atmosphere." };
        }

        function refreshTickets(id) {
            const g = gigs.find(x => x.id === id);
            const venue = VENUE_DB.find(v => g.venue.includes(v.name)) || { link: "https://google.com" };
            
            // Open the venue's site so you can see current availability
            window.open(venue.link, '_blank');
            
            // Immediately ask for the updated number
            setTimeout(() => {
                const newVal = prompt("How many tickets are sold now?", g.sold);
                if (newVal !== null) updateSold(id, newVal);
            }, 500);
        }

        function updateSold(id, val) {
            gigs.find(g => g.id === id).sold = parseInt(val);
            localStorage.setItem('aleph_gigs', JSON.stringify(gigs));
            viewDetail(id);
        }

        function copyDynamicCaption(id, mode) {
            const g = gigs.find(x => x.id === id);
            let text = `GIG UPDATE: ${g.title}\n📍 ${g.venue}\n`;
            if(mode === "LOW TICKET ALERT") text += `🚨 VERY LIMITED SEATS REMAINING! Grab yours before they are gone.`;
            else if(mode === "EMERGENCY BOOST") text += `Don't miss out on this lineup. Tickets available now!`;
            else text += `Join us for a night of live music. Link in bio.`;
            
            navigator.clipboard.writeText(text);
            alert(mode + " Caption Copied!");
        }

        // Auto-match capacity on sync/entry
        function matchVenueCap(name) {
            const match = VENUE_DB.find(v => name.toLowerCase().includes(v.name.toLowerCase()));
            return match ? match.cap : 50;
        }

        renderGigs();
    </script>
</body>
</html>
