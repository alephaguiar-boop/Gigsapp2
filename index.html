<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleph Gigs Pro</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 100px; }
        header { padding: 40px 20px 15px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #334155; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.3); }
        h1 { margin: 0; font-size: 22px; font-weight: 900; letter-spacing: -1px; color: var(--accent); }
        input, textarea { background: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 14px; width: 100%; color: white; box-sizing: border-box; margin-top: 8px; font-size: 16px; }
        .btn { background: var(--accent); color: white; padding: 16px; border-radius: 12px; font-weight: bold; border: none; width: 100%; margin-top: 10px; font-size: 16px; display: block; text-align: center; text-decoration: none; }
        .btn-secondary { background: #334155; margin-top: 8px; font-size: 14px; padding: 12px; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155; display: flex; padding-bottom: env(safe-area-inset-bottom); backdrop-filter: blur(10px); }
        .nav-item { flex: 1; text-align: center; padding: 15px; font-size: 11px; font-weight: 700; color: #94a3b8; text-decoration: none; text-transform: uppercase; letter-spacing: 1px; }
        .nav-item.active-nav { color: var(--accent); border-top: 2px solid var(--accent); }
        .sync-btn { background: #3b82f6; color: white; padding: 6px 14px; border-radius: 20px; font-size: 12px; font-weight: bold; border: none; }
    </style>
</head>
<body>

    <header>
        <h1>ALEPH GIGS</h1>
        <button onclick="syncCalendar()" class="sync-btn">🔄 SYNC</button>
    </header>

    <main>
        <section id="view-home" class="tab-content active">
            <div id="gig-list"></div>
        </section>

        <section id="view-settings" class="tab-content">
            <div class="card">
                <h3 style="margin-top:0">Google iCal Link</h3>
                <input type="text" id="setting-ical" placeholder="Paste .ics link" onchange="saveSettings()">
            </div>
            <div class="card">
                <h3>Local/Specific Venues</h3>
                <p style="font-size:11px; color:#94a3b8">Overwrites built-in data. Format: Name, Cap, Link</p>
                <textarea id="setting-venues" rows="4" onchange="saveSettings()"></textarea>
            </div>
            <div class="card">
                <h3>Personnel Tags</h3>
                <textarea id="setting-personnel" rows="3" placeholder="@bassist, @drummer" onchange="saveSettings()"></textarea>
            </div>
        </section>

        <section id="view-detail" class="tab-content">
            <div id="detail-content"></div>
        </section>
    </main>

    <nav>
        <div onclick="showView('home')" class="nav-item active-nav" id="nav-home">GIGS</div>
        <div onclick="showView('settings')" class="nav-item" id="nav-settings">SETTINGS</div>
    </nav>

    <script>
        let gigs = JSON.parse(localStorage.getItem('aleph_gigs')) || [];
        let settings = JSON.parse(localStorage.getItem('aleph_settings')) || { ical: '', venues: '', personnel: '' };

        // THE ULTIMATE UK JAZZ VENUE DATABASE
        const VENUE_LIBRARY = [
            // LONDON
            { name: "Ronnie Scott", cap: 220, link: "https://www.ronniescotts.co.uk" },
            { name: "606 Club", cap: 120, link: "https://www.606club.co.uk" },
            { name: "PizzaExpress Soho", cap: 110, link: "https://www.pizzaexpresslive.com" },
            { name: "Vortex", cap: 100, link: "https://www.vortexjazz.org" },
            { name: "Jazz Cafe", cap: 450, link: "https://thejazzcafelondon.com" },
            { name: "The Pheasantry", cap: 80, link: "https://www.pizzaexpresslive.com" },
            { name: "Hideaway", cap: 200, link: "https://www.hideawaylive.co.uk" },
            { name: "Kansas Smitty", cap: 50, link: "https://www.kansassmittys.com" },
            // SOUTH & BRIGHTON
            { name: "The Verdict", cap: 60, link: "https://www.verdictjazz.com" },
            { name: "Casablanca", cap: 150, link: "https://www.casablancajazzclub.com" },
            // NORTH & MIDLANDS
            { name: "Band on the Wall", cap: 500, link: "https://bandonthewall.org" },
            { name: "Matt & Phred", cap: 100, link: "https://mattandphreds.com" },
            { name: "Peggy's Skylight", cap: 90, link: "https://peggysskylight.co.uk" },
            { name: "The Jam House", cap: 300, link: "https://thejamhouse.com" },
            { name: "The Lescar", cap: 60, link: "https://www.jazzatthelescar.com" },
            // WEST & BRISTOL
            { name: "The Old Duke", cap: 100, link: "https://www.theoldduke.co.uk" },
            { name: "Bebop Club", cap: 60, link: "https://thebebopclub.com" },
            { name: "Greenbank", cap: 80, link: "https://www.greenbankbristol.co.uk" }
        ];

        function showView(viewId) {
            document.querySelectorAll('.tab-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('nav-' + viewId).classList.add('active-nav');
            if(viewId === 'home') renderGigs();
            if(viewId === 'settings') {
                document.getElementById('setting-ical').value = settings.ical;
                document.getElementById('setting-venues').value = settings.venues;
                document.getElementById('setting-personnel').value = settings.personnel;
            }
        }

        function saveSettings() {
            settings.ical = document.getElementById('setting-ical').value;
            settings.venues = document.getElementById('setting-venues').value;
            settings.personnel = document.getElementById('setting-personnel').value;
            localStorage.setItem('aleph_settings', JSON.stringify(settings));
        }

        async function syncCalendar() {
            if(!settings.ical) return alert("Add iCal link in Settings!");
            try {
                const res = await fetch("https://corsproxy.io/?" + encodeURIComponent(settings.ical));
                const text = await res.text();
                const events = text.split("BEGIN:VEVENT").slice(1);
                events.forEach(ev => {
                    const title = ev.match(/SUMMARY:(.*)/)?.[1]?.trim();
                    const start = ev.match(/DTSTART[:;](?:VALUE=DATE:)?(\d+T\d+|\d+)/)?.[1];
                    const loc = ev.match(/LOCATION:(.*)/)?.[1]?.trim() || "TBC";
                    if(title && start) {
                        const date = `${start.substring(0,4)}-${start.substring(4,6)}-${start.substring(6,8)}`;
                        if(!gigs.find(g => g.title === title && g.date === date)) {
                            const vMatch = findVenueData(loc);
                            gigs.push({id: Date.now()+Math.random(), title, venue: loc, date, time: "20:00", sold: 0, cap: vMatch.cap, link: vMatch.link});
                        }
                    }
                });
                localStorage.setItem('aleph_gigs', JSON.stringify(gigs));
                renderGigs();
                alert("Synced!");
            } catch(e) { alert("Sync Error"); }
        }

        function findVenueData(locName) {
            const customLines = settings.venues.split('\n');
            for(let line of customLines) {
                const parts = line.split(',').map(s => s.trim());
                if(parts.length >= 2 && locName.toLowerCase().includes(parts[0].toLowerCase())) {
                    return { cap: parseInt(parts[1]) || 50, link: parts[2] || '' };
                }
            }
            const found = VENUE_LIBRARY.find(v => locName.toLowerCase().includes(v.name.toLowerCase()));
            return found || { cap: 50, link: '' };
        }

        function renderGigs() {
            const list = document.getElementById('gig-list');
            list.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];
            const upcomingGigs = gigs.filter(g => g.date >= today).sort((a,b) => new Date(a.date) - new Date(b.date));

            if (upcomingGigs.length === 0) {
                list.innerHTML = '<p style="color:#64748b; text-align:center; padding-top:50px;">No upcoming shows.</p>';
                return;
            }

            upcomingGigs.forEach((g, i) => {
                const isNext = i === 0;
                list.innerHTML += `
                    <div class="card" onclick="viewDetail(${g.id})" style="${isNext ? 'border-left: 4px solid var(--accent);' : ''}">
                        <div style="display:flex; justify-content:space-between; align-items:start">
                            <div>
                                ${isNext ? '<span style="font-size:10px; color:var(--accent); font-weight:900">NEXT SHOW</span><br>' : ''}
                                <b style="font-size:18px">${g.title}</b><br>
                                <span style="font-size:13px; color:#94a3b8">📍 ${g.venue}</span>
                            </div>
                            <div style="text-align:right">
                                <span style="font-size:12px; color:var(--accent); font-weight:800">${g.date}</span><br>
                                <span style="font-size:11px; color:#64748b">${g.sold}/${g.cap}</span>
                            </div>
                        </div>
                    </div>`;
            });
        }

        function viewDetail(id) {
            const g = gigs.find(x => x.id === id);
            const ratio = g.sold / g.cap;
            const mapsUrl = `https://maps.apple.com/?daddr=${encodeURIComponent(g.venue)}`;

            document.getElementById('detail-content').innerHTML = `
                <div class="card">
                    <h2 style="margin:0">${g.title}</h2>
                    <p style="color:var(--accent); font-weight:bold; margin:5px 0">${g.venue}</p>
                    <p style="font-size:14px; color:#94a3b8">${g.date}</p>
                    <a href="${mapsUrl}" class="btn btn-secondary">🚗 GET DIRECTIONS</a>
                    <input type="range" min="0" max="${g.cap}" value="${g.sold}" onchange="updateSold(${id}, this.value)" style="margin-top:20px">
                    <p style="font-size:12px; text-align:center; margin-top:5px; color:#94a3b8">${g.sold} / ${g.cap} tickets sold</p>
                </div>
                <div class="card" style="background:#0f172a">
                    <h4 style="margin:0; font-size:12px; color:#64748b">PROMO TEXT</h4>
                    <p id="cap" style="font-size:14px; line-height:1.6; margin-top:10px">
                        Next up: ${g.title}!<br>
                        📍 ${g.venue}<br>
                        🗓️ ${g.date}<br><br>
                        ${settings.personnel ? 'Featuring: ' + settings.personnel + '<br><br>' : ''}
                        ${ratio > 0.8 ? '🔥 Low Ticket Alert!' : 'I would love to see you there.'}<br>
                        Tickets: ${g.link || '[Link]'}
                    </p>
                    <button class="btn" onclick="copyCap()">Copy for Instagram</button>
                </div>
                <button onclick="deleteGig(${id})" style="color:#ef4444; background:none; border:none; width:100%; margin-top:20px; font-weight:bold">DELETE GIG</button>
            `;
            showView('detail');
        }

        function updateSold(id, val) {
            gigs.find(g => g.id === id).sold = val;
            localStorage.setItem('aleph_gigs', JSON.stringify(gigs));
            viewDetail(id);
        }

        function deleteGig(id) { if(confirm("Delete?")) { gigs = gigs.filter(g => g.id !== id); localStorage.setItem('aleph_gigs', JSON.stringify(gigs)); showView('home'); } }
        function copyCap() { navigator.clipboard.writeText(document.getElementById('cap').innerText); alert('Copied!'); }
        renderGigs();
    </script>
</body>
</html>
