
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleph Gigs</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; margin: 0; padding-bottom: 80px; }
        header { padding: 40px 20px 20px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .tab-content { display: none; padding: 20px; }
        .active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 16px; margin-bottom: 15px; border: 1px solid #334155; }
        h1 { margin: 0; font-size: 24px; font-style: italic; color: var(--accent); }
        input, textarea { background: #0f172a; border: 1px solid #334155; border-radius: 8px; padding: 12px; width: 100%; color: white; box-sizing: border-box; margin-top: 5px; font-size: 16px; }
        .btn { background: var(--accent); color: white; padding: 14px; border-radius: 12px; font-weight: bold; text-align: center; border: none; width: 100%; display: block; margin-top: 10px; cursor: pointer; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-t: 1px solid #334155; display: flex; padding-bottom: 25px; }
        .nav-item { flex: 1; text-align: center; padding: 15px; font-size: 12px; color: #94a3b8; text-decoration: none; cursor: pointer; }
        .nav-item.active-nav { color: var(--accent); font-weight: bold; }
        .sync-btn { background: rgba(59, 130, 246, 0.2); border: 1px solid var(--accent); color: var(--accent); padding: 5px 12px; border-radius: 20px; font-size: 12px; }
    </style>
</head>
<body>

    <header>
        <h1>ALEPH GIGS</h1>
        <button onclick="syncCalendar()" class="sync-btn">🔄 Sync</button>
    </header>

    <main>
        <section id="view-home" class="tab-content active">
            <div id="gig-list"></div>
        </section>

        <section id="view-settings" class="tab-content">
            <div class="card">
                <h3>Google iCal Link</h3>
                <input type="text" id="setting-ical" placeholder="Paste .ics link here" onchange="saveSettings()">
            </div>
            <div class="card">
                <h3>Venues & Caps</h3>
                <textarea id="setting-venues" rows="5" placeholder="Venue Name, Capacity, URL" onchange="saveSettings()"></textarea>
            </div>
        </section>

        <section id="view-detail" class="tab-content">
            <div id="detail-content"></div>
        </section>
    </main>

    <nav>
        <div onclick="showView('home')" class="nav-item active-nav" id="nav-home">GIGS</div>
        <div onclick="showView('settings')" class="nav-item" id="nav-settings">SETTINGS</div>
    </nav>

    <script>
        let gigs = JSON.parse(localStorage.getItem('aleph_gigs')) || [];
        let settings = JSON.parse(localStorage.getItem('aleph_settings')) || { ical: '', venues: '' };

        function showView(viewId) {
            document.querySelectorAll('.tab-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('nav-' + viewId).classList.add('active-nav');
            if(viewId === 'home') renderGigs();
            if(viewId === 'settings') {
                document.getElementById('setting-ical').value = settings.ical;
                document.getElementById('setting-venues').value = settings.venues;
            }
        }

        function saveSettings() {
            settings.ical = document.getElementById('setting-ical').value;
            settings.venues = document.getElementById('setting-venues').value;
            localStorage.setItem('aleph_settings', JSON.stringify(settings));
        }

        async function syncCalendar() {
            if(!settings.ical) return alert("Go to Settings and paste your iCal link!");
            try {
                const res = await fetch("https://corsproxy.io/?" + encodeURIComponent(settings.ical));
                const text = await res.text();
                const events = text.split("BEGIN:VEVENT").slice(1);
                events.forEach(ev => {
                    const title = ev.match(/SUMMARY:(.*)/)?.[1]?.trim();
                    const start = ev.match(/DTSTART[:;](?:VALUE=DATE:)?(\d+T\d+|\d+)/)?.[1];
                    const loc = ev.match(/LOCATION:(.*)/)?.[1]?.trim() || "TBC";
                    if(title && start) {
                        const date = `${start.substring(0,4)}-${start.substring(4,6)}-${start.substring(6,8)}`;
                        if(!gigs.find(g => g.title === title && g.date === date)) {
                            gigs.push({id: Date.now()+Math.random(), title, venue: loc, date, time: "20:00", sold: 0, cap: 50});
                        }
                    }
                });
                localStorage.setItem('aleph_gigs', JSON.stringify(gigs));
                renderGigs();
                alert("Synced!");
            } catch(e) { alert("Sync Error"); }
        }

        function renderGigs() {
            const list = document.getElementById('gig-list');
            list.innerHTML = gigs.length ? '' : '<p style="color:#64748b">No gigs found. Sync or add one.</p>';
            gigs.sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(g => {
                list.innerHTML += `<div class="card" onclick="viewDetail(${g.id})">
                    <div style="display:flex; justify-content:space-between">
                        <b>${g.title}</b>
                        <span style="font-size:12px; color:var(--accent)">${g.date}</span>
                    </div>
                    <div style="font-size:13px; color:#94a3b8">${g.venue}</div>
                </div>`;
            });
        }

        function viewDetail(id) {
            const g = gigs.find(x => x.id === id);
            document.getElementById('detail-content').innerHTML = `
                <div class="card">
                    <h2>${g.title}</h2>
                    <p>${g.venue} | ${g.date}</p>
                    <hr style="border:0; border-top:1px solid #334155; margin:15px 0">
                    <label>Tickets Sold: ${g.sold}</label>
                    <input type="range" min="0" max="${g.cap}" value="${g.sold}" onchange="updateSold(${id}, this.value)">
                </div>
                <div class="card" style="background:#0f172a">
                    <p id="cap" style="font-size:14px">Next up: ${g.title} at ${g.venue} on ${g.date}. See you there!</p>
                    <button class="btn" onclick="navigator.clipboard.writeText(document.getElementById('cap').innerText); alert('Copied!')">Copy Caption</button>
                </div>
                <button onclick="deleteGig(${id})" style="color:#ef4444; background:none; border:none; width:100%; margin-top:20px">Delete Gig</button>
            `;
            showView('detail');
        }

        function updateSold(id, val) {
            gigs.find(g => g.id === id).sold = val;
            localStorage.setItem('aleph_gigs', JSON.stringify(gigs));
            viewDetail(id);
        }

        function deleteGig(id) {
            gigs = gigs.filter(g => g.id !== id);
            localStorage.setItem('aleph_gigs', JSON.stringify(gigs));
            showView('home');
        }

        renderGigs();
    </script>
</body>
</html>
