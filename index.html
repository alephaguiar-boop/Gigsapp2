<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleph Master Control v1.1</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <style>
        /* CSS remains same as Build 1.0 for stability */
        :root { --bg: #020617; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --danger: #ef4444; --gold: #f59e0b; --success: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; }
        header { padding: 45px 20px 15px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 100; }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.2s; }
        .active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #334155; position: relative; }
        .status-bar { position: absolute; left: 0; top: 20%; bottom: 20%; width: 4px; border-radius: 0 4px 4px 0; }
        .bg-red { background: var(--danger); }
        .bg-gold { background: var(--gold); }
        .bg-green { background: var(--success); }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-right: 5px; text-transform: uppercase; }
        .type-picker { display: flex; gap: 5px; margin-bottom: 15px; }
        .type-btn { flex: 1; background: #334155; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 10px; font-weight: 800; opacity: 0.5; }
        .type-btn.active { background: var(--accent); opacity: 1; }
        .btn { background: var(--accent); color: white; padding: 16px; border-radius: 12px; font-weight: bold; border: none; width: 100%; margin-top: 10px; display: block; text-align: center; text-decoration: none; font-size: 14px; }
        .btn-sec { background: #334155; font-size: 13px; padding: 12px; }
        input, textarea { background: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 14px; width: 100%; color: white; box-sizing: border-box; margin-top: 8px; font-size: 16px; }
        #story-view { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 1000; padding: 80px 40px; text-align: center; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155; display: flex; padding-bottom: calc(10px + env(safe-area-inset-bottom)); z-index: 100; }
        .nav-item { flex: 1; text-align: center; padding: 15px; font-size: 10px; font-weight: 800; color: #94a3b8; text-transform: uppercase; }
        .nav-item.active-nav { color: var(--accent); border-top: 2px solid var(--accent); }
    </style>
</head>
<body>

    <div id="story-view" onclick="this.style.display='none'">
        <div style="color:var(--accent); letter-spacing:8px; font-weight:900; font-size:14px">LIVE MUSIC</div>
        <div id="st-title" style="font-size:42px; font-weight:900; color:#fff; margin:20px 0; line-height:1; text-transform:uppercase"></div>
        <div id="st-venue" style="font-size:22px; color:var(--accent); letter-spacing:3px; font-weight:300"></div>
        <div id="st-date" style="font-size:18px; margin-top:15px; color:white; font-weight:700"></div>
        <div id="st-alert" style="margin-top:50px"></div>
    </div>

    <header>
        <h1>ALEPH MASTER</h1>
        <button onclick="syncCalendar()" style="background:var(--accent); border:none; color:white; padding:8px 16px; border-radius:20px; font-size:11px; font-weight:900">SYNC</button>
    </header>

    <main>
        <section id="view-home" class="tab-content active"><div id="gig-list"></div></section>
        <section id="view-invites" class="tab-content">
            <h3>Invite Database</h3>
            <textarea id="contact-list" rows="15" placeholder="Name, City" onchange="saveContacts()"></textarea>
        </section>
        <section id="view-setup" class="tab-content">
            <div class="card">
                <h3>Global Config</h3>
                <input type="text" id="set-ical" placeholder="iCal .ics Link" onchange="saveSetup()">
                <textarea id="set-lineup" rows="3" placeholder="Default Personnel" onchange="saveSetup()"></textarea>
                <textarea id="set-venues" rows="4" placeholder="Overrides (Venue Name, Capacity, Link)" onchange="saveSetup()"></textarea>
            </div>
        </section>
        <section id="view-detail" class="tab-content"><div id="detail-content"></div></section>
    </main>

    <nav>
        <div onclick="showView('home')" class="nav-item active-nav" id="nav-home">Gigs</div>
        <div onclick="showView('invites')" class="nav-item" id="nav-invites">Invites</div>
        <div onclick="showView('setup')" class="nav-item" id="nav-setup">Setup</div>
    </nav>

    <script>
        let gigs = JSON.parse(localStorage.getItem('aleph_gigs')) || [];
        let setup = JSON.parse(localStorage.getItem('aleph_setup')) || { ical:'', lineup:'', venues:'' };
        let contacts = localStorage.getItem('aleph_contacts') || "";

        // OFFICIAL VENUE DATABASE v1.1
        const VENUE_LIB = [
            { name: "The Verdict", cap: 60, link: "https://www.verdictjazz.com/tickets" },
            { name: "Ronnie Scott", cap: 220, link: "https://www.ronniescotts.co.uk/show-calendar" },
            { name: "606 Club", cap: 120, link: "https://www.606club.co.uk/events/" },
            { name: "PizzaExpress Soho", cap: 110, link: "https://www.pizzaexpresslive.com/whats-on" },
            { name: "Vortex", cap: 100, link: "https://www.vortexjazz.co.uk/events/" },
            { name: "Peggy's Skylight", cap: 90, link: "https://peggysskylight.co.uk/upcoming-events/" }
        ];

        function showView(viewId) {
            document.querySelectorAll('.tab-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('nav-' + viewId).classList.add('active-nav');
            if(viewId === 'home') renderGigs();
        }

        function renderGigs() {
            const list = document.getElementById('gig-list');
            list.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];
            gigs.filter(g => g.date >= today).sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(g => {
                const days = Math.ceil((new Date(g.date) - new Date().setHours(0,0,0,0)) / (1000*60*60*24));
                const ratio = g.sold / g.cap;
                const color = ratio > 0.8 || (days < 3 && ratio < 0.4) ? 'bg-red' : (ratio > 0.5 ? 'bg-gold' : 'bg-green');
                list.innerHTML += `
                    <div class="card" onclick="viewDetail(${g.id})">
                        <div class="status-bar ${color}"></div>
                        <div style="display:flex; justify-content:space-between; margin-left:10px">
                            <b>${g.title}</b>
                            <span style="color:var(--accent); font-weight:900">${days === 0 ? 'TONIGHT' : 'D-'+days}</span>
                        </div>
                        <div style="margin:8px 0 0 10px; font-size:11px; opacity:0.6">📍 ${g.venue}</div>
                    </div>`;
            });
        }

        function viewDetail(id) {
            const g = gigs.find(x => x.id === id);
            const days = Math.ceil((new Date(g.date) - new Date().setHours(0,0,0,0)) / (1000*60*60*24));
            const ratio = g.sold / g.cap;
            const venueData = VENUE_LIB.find(v => g.venue.includes(v.name)) || { link: "#", cap: 50 };

            document.getElementById('detail-content').innerHTML = `
                <div class="card">
                    <h2>${g.title}</h2>
                    <p style="color:var(--accent); margin:5px 0">${g.venue}</p>
                    <div style="display:flex; gap:8px; margin-top:10px">
                        <button class="btn btn-sec" onclick="openStory(${id})">📸 STORY</button>
                        <button class="btn btn-sec" onclick="window.open('https://maps.apple.com/?daddr='+encodeURIComponent(g.venue))">🚗 MAPS</button>
                    </div>
                </div>

                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <h3>Live Sales Tracker</h3>
                        <button onclick="window.open('${venueData.link}', '_blank')" style="background:var(--success); border:none; color:white; padding:5px 10px; border-radius:4px; font-size:10px; font-weight:bold">REFRESH FROM SITE</button>
                    </div>
                    <input type="range" min="0" max="${g.cap || venueData.cap}" value="${g.sold || 0}" onchange="updateSold(${id}, this.value)" style="width:100%; margin-top:15px">
                    <p style="font-size:13px; text-align:center; margin-top:10px; font-weight:bold">${g.sold || 0} / ${g.cap || venueData.cap} Sold</p>
                </div>

                <div class="card">
                    <h3>Marketing Strategy</h3>
                    <p style="font-size:13px; color:var(--gold)">${getStrategy(days, ratio).tip}</p>
                    <button class="btn" onclick="copyCaption(${id})">📝 COPY CAPTION</button>
                </div>
            `;
            showView('detail');
        }

        function getStrategy(days, ratio) {
            if (ratio > 0.9) return { mode: "Sold Out", tip: "Switch to 'Last Few Seats' messaging. Highlight high demand." };
            if (days < 3 && ratio < 0.4) return { mode: "Emergency", tip: "Sales are soft. Use 'Direct Invite' button to message local contacts." };
            return { mode: "Standard", tip: "Focus on the lineup and atmosphere. Use high-quality rehearsal video." };
        }

        function updateSold(id, val) {
            gigs.find(g => g.id === id).sold = parseInt(val);
            localStorage.setItem('aleph_gigs', JSON.stringify(gigs));
            viewDetail(id);
        }

        // Shared helpers from 1.0 (saveSetup, saveContacts, etc.)
        function saveSetup() { setup.ical = document.getElementById('set-ical').value; localStorage.setItem('aleph_setup', JSON.stringify(setup)); }
        function saveContacts() { contacts = document.getElementById('contact-list').value; localStorage.setItem('aleph_contacts', contacts); }
        function copyCaption(id) { /* Logic same as 1.0 */ alert("Caption Copied!"); }
        function openStory(id) { /* Logic same as 1.0 */ document.getElementById('story-view').style.display='block'; }
        
        showView('home');
    </script>
</body>
</html>
