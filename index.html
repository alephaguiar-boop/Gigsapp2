<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleph Gigs Ultimate</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --danger: #ef4444; --gold: #f59e0b; --success: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; }
        header { padding: 45px 20px 15px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #334155; }
        
        /* Event Type Toggles */
        .type-picker { display: flex; gap: 5px; margin-bottom: 15px; }
        .type-btn { flex: 1; background: #334155; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 11px; font-weight: 700; opacity: 0.6; }
        .type-btn.active-type { background: var(--accent); opacity: 1; }

        /* Story Mode */
        #story-view { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 1000; padding: 80px 40px; text-align: center; }
        .story-title { font-size: 44px; font-weight: 900; line-height: 1; margin: 25px 0; text-transform: uppercase; color: #fff; }
        .story-venue { font-size: 22px; color: var(--accent); letter-spacing: 3px; }
        
        .btn { background: var(--accent); color: white; padding: 16px; border-radius: 12px; font-weight: bold; border: none; width: 100%; margin-top: 10px; display: block; text-align: center; text-decoration: none; }
        .btn-sec { background: #334155; font-size: 13px; padding: 10px; }
        input, textarea { background: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 14px; width: 100%; color: white; box-sizing: border-box; margin-top: 8px; font-size: 16px; }
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155; display: flex; padding-bottom: 30px; }
        .nav-item { flex: 1; text-align: center; padding: 15px; font-size: 10px; font-weight: 800; color: #94a3b8; }
        .nav-item.active-nav { color: var(--accent); }
    </style>
</head>
<body>

    <div id="story-view" onclick="this.style.display='none'">
        <div id="st-top" style="color:var(--accent); font-weight:900; letter-spacing:6px">LIVE MUSIC</div>
        <div class="story-title" id="st-title"></div>
        <div class="story-venue" id="st-venue"></div>
        <div id="st-date" style="font-size: 18px; margin-top: 15px; font-weight: 700; color: white;"></div>
        <div id="st-alert" style="margin-top:40px"></div>
    </div>

    <header>
        <h1>ALEPH GIGS</h1>
        <button onclick="syncCalendar()" style="background:var(--accent); color:white; border:none; padding:6px 14px; border-radius:20px; font-size:11px; font-weight:bold">SYNC</button>
    </header>

    <main>
        <section id="view-home" class="tab-content active"><div id="gig-list"></div></section>
        <section id="view-settings" class="tab-content">
            <div class="card">
                <h3>iCal Sync</h3>
                <input type="text" id="setting-ical" placeholder="Paste .ics link" onchange="saveSettings()">
                <h3>Default Personnel</h3>
                <textarea id="setting-personnel" rows="3" onchange="saveSettings()"></textarea>
            </div>
        </section>
        <section id="view-detail" class="tab-content"><div id="detail-content"></div></section>
    </main>

    <nav>
        <div onclick="showView('home')" class="nav-item active-nav" id="nav-home">GIGS</div>
        <div onclick="showView('settings')" class="nav-item" id="nav-settings">SETTINGS</div>
    </nav>

    <script>
        let gigs = JSON.parse(localStorage.getItem('aleph_gigs')) || [];
        let settings = JSON.parse(localStorage.getItem('aleph_settings')) || { ical: '', personnel: '' };

        function showView(viewId) {
            document.querySelectorAll('.tab-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById('view-' + viewId).classList.add('active');
            document.getElementById('nav-' + viewId).classList.add('active-nav');
            if(viewId === 'home') renderGigs();
            if(viewId === 'settings') {
                document.getElementById('setting-ical').value = settings.ical;
                document.getElementById('setting-personnel').value = settings.personnel;
            }
        }

        function saveSettings() {
            settings.ical = document.getElementById('setting-ical').value;
            settings.personnel = document.getElementById('setting-personnel').value;
            localStorage.setItem('aleph_settings', JSON.stringify(settings));
        }

        function updateType(id, type) {
            gigs.find(g => g.id === id).type = type;
            localStorage.setItem('aleph_gigs', JSON.stringify(gigs));
            viewDetail(id);
        }

        function renderGigs() {
            const list = document.getElementById('gig-list');
            list.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];
            gigs.filter(g => g.date >= today).sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(g => {
                const typeLabel = g.type === 'free' ? 'FREE' : (g.type === 'tbc' ? 'TBC' : '');
                list.innerHTML += `
                    <div class="card" onclick="viewDetail(${g.id})">
                        <div style="display:flex; justify-content:space-between">
                            <b>${g.title}</b>
                            <span style="font-size:10px; color:var(--gold)">${typeLabel}</span>
                        </div>
                        <div style="font-size:12px; color:#94a3b8; margin-top:5px">${g.date} • ${g.venue.split(',')[0]}</div>
                    </div>`;
            });
        }

        function viewDetail(id) {
            const g = gigs.find(x => x.id === id);
            const type = g.type || (g.link ? 'ticketed' : 'tbc');
            const pText = g.personnel || settings.personnel;
            
            let promoText = `Next up: ${g.title}!\n📍 ${g.venue}\n🗓️ ${g.date}\n\nFeaturing: ${pText}\n\n`;
            if(type === 'ticketed') promoText += `Tickets: ${g.link || '[Link]'}`;
            else if(type === 'free') promoText += `FREE ENTRY - Just turn up!`;
            else promoText += `More info coming soon...`;

            document.getElementById('detail-content').innerHTML = `
                <div class="type-picker">
                    <button class="type-btn ${type==='ticketed'?'active-type':''}" onclick="updateType(${id}, 'ticketed')">TICKETED</button>
                    <button class="type-btn ${type==='free'?'active-type':''}" onclick="updateType(${id}, 'free')">FREE</button>
                    <button class="type-btn ${type==='tbc'?'active-type':''}" onclick="updateType(${id}, 'tbc')">TBC</button>
                </div>

                <div class="card">
                    <h2 style="margin:0">${g.title}</h2>
                    <button class="btn" onclick="openStory(${id})">📸 PREVIEW STORY</button>
                </div>

                ${type === 'ticketed' ? `
                <div class="card">
                    <h3>Ticket Tracker</h3>
                    <input type="range" min="0" max="${g.cap || 50}" value="${g.sold || 0}" onchange="updateSold(${id}, this.value)" style="width:100%">
                    <p style="font-size:12px">${g.sold || 0} / ${g.cap || 50} Sold</p>
                </div>` : ''}

                <div class="card" style="background:#0f172a">
                    <p id="cap-box" style="font-size:13px; white-space:pre-wrap">${promoText}</p>
                    <button class="btn btn-sec" onclick="copyCap()">COPY CAPTION</button>
                </div>
            `;
            showView('detail');
        }

        function openStory(id) {
            const g = gigs.find(x => x.id === id);
            const type = g.type || (g.link ? 'ticketed' : 'tbc');
            document.getElementById('st-title').innerText = g.title;
            document.getElementById('st-venue').innerText = g.venue.split(',')[0];
            document.getElementById('st-date').innerText = g.date;
            
            let alertHtml = '';
            if(type === 'free') alertHtml = '<div style="background:var(--success); color:white; padding:10px 20px; font-weight:900; border-radius:4px">FREE ENTRY</div>';
            else if(type === 'ticketed' && (g.sold/g.cap > 0.8)) alertHtml = '<div style="background:var(--danger); color:white; padding:10px 20px; font-weight:900; border-radius:4px">LOW TICKETS</div>';
            
            document.getElementById('st-alert').innerHTML = alertHtml;
            document.getElementById('story-view').style.display = 'block';
        }

        function updateSold(id, val) { gigs.find(g => g.id === id).sold = parseInt(val); localStorage.setItem('aleph_gigs', JSON.stringify(gigs)); viewDetail(id); }
        function copyCap() { navigator.clipboard.writeText(document.getElementById('cap-box').innerText); alert("Copied!"); }
        async function syncCalendar() { /* iCal logic matches previous versions */ alert("Syncing..."); }
        renderGigs();
    </script>
</body>
</html>
