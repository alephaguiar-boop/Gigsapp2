<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aleph Gigs: Master Control</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        :root { --bg: #020617; --card: #1e293b; --accent: #3b82f6; --text: #f8fafc; --danger: #ef4444; --gold: #f59e0b; --success: #22c55e; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; margin: 0; padding-bottom: 120px; }
        header { padding: 45px 20px 15px; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.2s; }
        .active { display: block; }
        .card { background: var(--card); border-radius: 12px; padding: 18px; margin-bottom: 15px; border: 1px solid #334155; }
        
        /* Dashboard Badges */
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; margin-right: 5px; }
        .badge-score { background: rgba(59, 130, 246, 0.2); color: var(--accent); }
        .badge-urgent { background: rgba(239, 68, 68, 0.2); color: var(--danger); }

        /* Controls */
        .type-picker { display: flex; gap: 5px; margin-bottom: 15px; }
        .type-btn { flex: 1; background: #334155; color: white; border: none; padding: 8px; border-radius: 6px; font-size: 10px; font-weight: 700; opacity: 0.5; }
        .type-btn.active-type { background: var(--accent); opacity: 1; }
        .btn { background: var(--accent); color: white; padding: 16px; border-radius: 12px; font-weight: bold; border: none; width: 100%; margin-top: 10px; display: block; text-align: center; text-decoration: none; }
        .btn-sec { background: #334155; font-size: 13px; padding: 10px; }
        input, textarea { background: #0f172a; border: 1px solid #475569; border-radius: 8px; padding: 14px; width: 100%; color: white; box-sizing: border-box; margin-top: 8px; }

        /* Story Mode Overlay */
        #story-view { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #000; z-index: 1000; padding: 80px 40px; text-align: center; }
        
        nav { position: fixed; bottom: 0; left: 0; right: 0; background: #1e293b; border-top: 1px solid #334155; display: flex; padding-bottom: 30px; }
        .nav-item { flex: 1; text-align: center; padding: 15px; font-size: 10px; font-weight: 800; color: #94a3b8; }
        .nav-item.active-nav { color: var(--accent); border-top: 2px solid var(--accent); }
    </style>
</head>
<body>

    <div id="story-view" onclick="this.style.display='none'">
        <div style="color:var(--accent); letter-spacing:6px; font-weight:900">LIVE MUSIC</div>
        <div id="st-title" style="font-size:44px; font-weight:900; color:white; margin:20px 0; text-transform:uppercase"></div>
        <div id="st-venue" style="font-size:22px; color:var(--accent); letter-spacing:2px"></div>
        <div id="st-date" style="font-size:18px; margin-top:10px; color:white"></div>
        <div id="st-alert" style="margin-top:40px"></div>
    </div>

    <header>
        <h1>ALEPH GIGS</h1>
        <button onclick="syncCalendar()" style="background:var(--accent); border:none; color:white; padding:6px 14px; border-radius:20px; font-size:11px; font-weight:bold">SYNC</button>
    </header>

    <main>
        <section id="view-home" class="tab-content active"><div id="gig-list"></div></section>
        
        <section id="view-invites" class="tab-content">
            <h3>Invite Manager</h3>
            <div class="card">
                <p style="font-size:12px; color:#94a3b8">Format: Name, City (e.g. John, London)</p>
                <textarea id="contact-list" rows="12" placeholder="Dave, Brighton&#10;Sarah, London" onchange="saveContacts()"></textarea>
            </div>
        </section>

        <section id="view-settings" class="tab-content">
            <div class="card">
                <h3>System Setup</h3>
                <input type="text" id="setting-ical" placeholder="iCal Link" onchange="saveSettings()">
                <textarea id="setting-personnel" rows="3" placeholder="Default Lineup" onchange="saveSettings()"></textarea>
                <textarea id="setting-venues" rows="3" placeholder="Venue Overrides (Name, Cap, Link)" onchange="saveSettings()"></textarea>
            </div>
        </section>

        <section id="view-detail" class="tab-content"><div id="detail-content"></div></section>
    </main>

    <nav>
        <div onclick="showView('home')" class="nav-item active-nav" id="nav-home">GIGS</div>
        <div onclick="showView('invites')" class="nav-item" id="nav-invites">INVITES</div>
        <div onclick="showView('settings')" class="nav-item" id="nav-settings">SETUP</div>
    </nav>

    <script>
        let gigs = JSON.parse(localStorage.getItem('aleph_gigs')) || [];
        let settings = JSON.parse(localStorage.getItem('aleph_settings')) || { ical: '', personnel: '', venues: '' };
        let contacts = localStorage.getItem('aleph_contacts') || "";

        function showView(viewId) {
            document.querySelectorAll('.tab-content').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
            document.getElementById('view-' + viewId).classList.add('active');
            if(document.getElementById('nav-' + viewId)) document.getElementById('nav-' + viewId).classList.add('active-nav');
            if(viewId === 'home') renderGigs();
            if(viewId === 'invites') document.getElementById('contact-list').value = contacts;
        }

        function saveSettings() {
            settings.ical = document.getElementById('setting-ical').value;
            settings.personnel = document.getElementById('setting-personnel').value;
            settings.venues = document.getElementById('setting-venues').value;
            localStorage.setItem('aleph_settings', JSON.stringify(settings));
        }

        function saveContacts() {
            contacts = document.getElementById('contact-list').value;
            localStorage.setItem('aleph_contacts', contacts);
        }

        function renderGigs() {
            const list = document.getElementById('gig-list');
            list.innerHTML = '';
            const today = new Date().toISOString().split('T')[0];
            gigs.filter(g => g.date >= today).sort((a,b) => new Date(a.date) - new Date(b.date)).forEach(g => {
                const days = Math.ceil((new Date(g.date) - new Date().setHours(0,0,0,0)) / (1000*60*60*24));
                const score = (g.poster ? 1 : 0) + (g.video ? 1 : 0) + (g.link ? 1 : 0);
                list.innerHTML += `
                    <div class="card" onclick="viewDetail(${g.id})">
                        <div style="display:flex; justify-content:space-between">
                            <b>${g.title}</b>
                            <span style="color:var(--accent); font-weight:800">${days === 0 ? 'TONIGHT' : 'D-'+days}</span>
                        </div>
                        <div style="margin-top:8px">
                            <span class="badge badge-score">Pack: ${score}/3</span>
                            <span class="badge ${g.sold/g.cap > 0.8 ? 'badge-urgent' : ''}">${g.sold || 0}/${g.cap || 50} Sold</span>
                        </div>
                    </div>`;
            });
        }

        function viewDetail(id) {
            const g = gigs.find(x => x.id === id);
            const days = Math.ceil((new Date(g.date) - new Date().setHours(0,0,0,0)) / (1000*60*60*24));
            const type = g.type || (g.link ? 'ticketed' : 'tbc');
            
            document.getElementById('detail-content').innerHTML = `
                <div class="type-picker">
                    <button class="type-btn ${type==='ticketed'?'active-type':''}" onclick="updateType(${id}, 'ticketed')">TICKETED</button>
                    <button class="type-btn ${type==='free'?'active-type':''}" onclick="updateType(${id}, 'free')">FREE</button>
                    <button class="type-btn ${type==='tbc'?'active-type':''}" onclick="updateType(${id}, 'tbc')">TBC</button>
                </div>

                <div class="card">
                    <h2 style="margin:0">${g.title}</h2>
                    <p style="color:var(--accent); margin:5px 0">${g.venue}</p>
                    <div style="display:flex; gap:10px; margin-top:10px">
                        <button class="btn btn-sec" onclick="openStory(${id})">📸 STORY</button>
                        <button class="btn btn-sec" onclick="window.open('https://maps.apple.com/?daddr=' + encodeURIComponent(g.venue))">🚗 MAPS</button>
                    </div>
                </div>

                <div class="card">
                    <h3>Marketing Checklist (D-${days})</h3>
                    <p style="font-size:13px; color:var(--gold)">${getStrategy(days)}</p>
                    <div style="font-size:11px; margin-top:10px; opacity:0.7">
                        ${g.poster ? '✅ Poster Ready' : '❌ Poster Missing'}<br>
                        ${g.video ? '✅ Video Ready' : '❌ Video Missing'}
                    </div>
                    <button class="btn" onclick="copyCaption(${id})">📝 Copy Caption</button>
                    <button class="btn btn-sec" onclick="generateInvite(${id})">✉️ Invite Contact</button>
                </div>

                <div class="card">
                    <h3>Ticket Control</h3>
                    <input type="range" min="0" max="${g.cap || 50}" value="${g.sold || 0}" onchange="updateSold(${id}, this.value)" style="width:100%">
                    <button class="btn btn-sec" style="margin-top:10px" onclick="editVisuals(${id})">🖼️ Add Poster/Reel URL</button>
                </div>
            `;
            showView('detail');
        }

        function getStrategy(days) {
            if(days === 0) return "POST TONIGHT: Final call. Tag the venue. Use link sticker.";
            if(days <= 2) return "URGENCY: Post ticket countdown. Send direct messages to warm contacts.";
            if(days <= 7) return "LINEUP: Tag the band. Share a rehearsal or past video clip.";
            return "ANNOUNCE: Share the main poster and save the event link.";
        }

        function updateType(id, type) { gigs.find(g => g.id === id).type = type; localStorage.setItem('aleph_gigs', JSON.stringify(gigs)); viewDetail(id); }
        function updateSold(id, val) { gigs.find(g => g.id === id).sold = parseInt(val); localStorage.setItem('aleph_gigs', JSON.stringify(gigs)); viewDetail(id); }
        
        function editVisuals(id) {
            const g = gigs.find(x => x.id === id);
            const p = prompt("Poster Image URL:", g.poster || "");
            const v = prompt("Video/Reel URL:", g.video || "");
            if(p !== null) g.poster = p;
            if(v !== null) g.video = v;
            localStorage.setItem('aleph_gigs', JSON.stringify(gigs));
            viewDetail(id);
        }

        function generateInvite(id) {
            const g = gigs.find(x => x.id === id);
            const venueCity = g.venue.toLowerCase();
            const relevant = contacts.split('\n').filter(c => venueCity.includes(c.split(',')[1]?.trim().toLowerCase() || "___"));
            if(relevant.length === 0) return alert("No contacts found for this city. Add them in INVITES!");
            const name = relevant[0].split(',')[0];
            const text = `Hey ${name}, I'm at ${g.venue.split(',')[0]} on ${g.date}. Hope to see you there! ${g.link || ''}`;
            navigator.clipboard.writeText(text);
            alert("Invite for " + name + " copied!");
        }

        function copyCaption(id) {
            const g = gigs.find(x => x.id === id);
            const pText = g.personnel || settings.personnel;
            const text = `NEXT UP: ${g.title}\n📍 ${g.venue}\n🗓️ ${g.date}\n\nLineup: ${pText}\n\nTickets: ${g.link || '[Link]'}`;
            navigator.clipboard.writeText(text);
            alert("Caption Copied!");
        }

        function openStory(id) {
            const g = gigs.find(x => x.id === id);
            document.getElementById('st-title').innerText = g.title;
            document.getElementById('st-venue').innerText = g.venue.split(',')[0];
            document.getElementById('st-date').innerText = g.date;
            document.getElementById('st-alert').innerHTML = (g.sold/g.cap > 0.8) ? '<div style="background:var(--danger); color:white; padding:10px 20px; font-weight:900; border-radius:4px">LOW TICKETS</div>' : '';
            document.getElementById('story-view').style.display = 'block';
        }

        async function syncCalendar() { /* Keep existing sync logic */ alert("Syncing..."); }
        renderGigs();
    </script>
</body>
</html>
